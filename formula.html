<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compound Interest Formula | CFA Institute</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="cfa-base.css">
  <link rel="stylesheet" href="exemplar-specific.css">

  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      MathML: { extensions: ["content-mathml.js"] },
      "HTML-CSS": { scale: 95, linebreaks: { automatic: true } },
      menuSettings: { explorer: true },
      skipStartupTypeset: false
    });

    MathJax.Hub.Register.StartupHook("End", function () {
      document.querySelectorAll('[tabindex]').forEach(function (el) {
        if (el.closest && el.closest('.formula-equation-card')) return;
        if (el.classList.contains('MathJax') ||
            el.classList.contains('MathJax_Display') ||
            (el.id && el.id.indexOf('MathJax-') === 0) ||
            el.tagName === 'MATH' ||
            (el.closest && el.closest('.MathJax'))) {
          el.removeAttribute('tabindex');
        }
      });
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=MML_HTMLorMML"></script>
</head>
<body>
  <div class="container">
    <main class="content">
      <section class="card formula-equation-card">
        <math xmlns="http://www.w3.org/1998/Math/MathML" display="block">
          <mrow>
            <mi mathcolor="#3C6AE5">A</mi>
            <mo>=</mo>
            <mi mathcolor="#07514F">P</mi>
            <mo>&#x00D7;</mo>
            <msup>
              <mrow>
                <mo>(</mo>
                <mn>1</mn>
                <mo>+</mo>
                <mi mathcolor="#B95B1D">r</mi>
                <mo>)</mo>
              </mrow>
              <mi mathcolor="#0079A6">n</mi>
            </msup>
          </mrow>
        </math>
      </section>
    </main>
  </div>
</body>
</html>
